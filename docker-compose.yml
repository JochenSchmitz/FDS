# FDS — FES Dokumenten Service
#
# OCR-Modell als Profil (Gewichte ~34 GB, das Laden dauert Minuten):
#   docker compose --profile ocr up -d    # OCR/Vision -> Port 8012
#   docker compose --profile ocr down     # stoppen
#
# Der pip-Fix behebt einen Bug im 26.06-Image: instrumentator 8.0.0
# ist inkompatibel mit FastAPI 0.137 (alle Requests -> HTTP 500).

# Fester Projektname: Volume- und Netzwerknamen (fds_pgdata) hängen
# damit nicht am Verzeichnisnamen.
name: fds
x-vllm-common: &vllm-common
  image: nvcr.io/nvidia/vllm:26.06-py3
  restart: unless-stopped
  ipc: host
  environment:
    - HF_HOME=/hf-home
  volumes:
    - ./hf-home:/hf-home
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
    interval: 15s
    timeout: 5s
    retries: 120
    start_period: 120s

services:
  # Dokumenten-Datenbank für die OCR-Pipeline (läuft immer, kein Profil).
  # Postgres 18 bringt uuidv7() nativ mit — passt zur UUID7-Konvention.
  db:
    image: postgres:18.3
    container_name: fds-db
    restart: unless-stopped
    environment:
      # Werte kommen aus .env (docker compose lädt sie automatisch)
      POSTGRES_DB: ${POSTGRES_DB:-dokumente}
      POSTGRES_USER: ${POSTGRES_USER:-dokumente}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dokumente-dev}
    ports:
      - "5435:5432"   # 5432/5434 sind von anderen Projekten belegt
    volumes:
      # Ab Postgres 18 wird /var/lib/postgresql gemountet (nicht .../data)
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokumente -d dokumente"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Vision-Language-Modell für Dokument-OCR (gescannte Seiten -> Text).
  # Offizielle FP8-Quantisierung: nahezu verlustfrei, läuft nativ auf
  # Blackwell und lässt reichlich KV-Cache für hochaufgelöste Seiten.
  # --gpu-memory-utilization 0.60 bewusst konservativ: der Ollama-
  # Systemdienst belegt dauerhaft ~22 GB des Unified Memory.
  qwen-ocr:
    <<: *vllm-common
    container_name: qwen-ocr-vllm
    profiles: ["ocr"]
    ports:
      - "8012:8000"
    command: >
      bash -c "pip install --no-cache-dir 'prometheus-fastapi-instrumentator>=8.0.2' &&
      vllm serve Qwen/Qwen3-VL-32B-Instruct-FP8
      --host 0.0.0.0
      --port 8000
      --max-model-len 65536
      --gpu-memory-utilization 0.60"

  # Load-Balancer vor beide vLLM-OCR-Endpunkte: vip lokal (127.0.0.1:8012)
  # + zweiter GB10 tbv-server (172.31.102.12:8012). Verteilt einzelne
  # Anfragen (jede OCR-Seite = eine Anfrage) per least-connection über beide
  # GPUs; das Backend spricht nur diesen Proxy an (VLLM_URL -> :8013).
  # Host-Netz: bindet :8013 und erreicht beide Backends direkt.
  vllm-lb:
    image: haproxytech/haproxy-alpine:3.0
    container_name: fds-vllm-lb
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

volumes:
  pgdata:
