# Load-Balancer vor die beiden vLLM-OCR-Endpunkte (vip lokal + tbv-server).
# Verteilt einzelne Anfragen (jede OCR-Seite = eine Anfrage) per
# least-connection auf beide GB10 — so nutzt selbst ein einzelnes großes
# Dokument beide GPUs. Das Backend spricht nur diesen Proxy an (VLLM_URL).
global
    log stdout format raw local0
    maxconn 8192

defaults
    mode http
    log global
    option httplog
    # OCR-Anfragen können viele Minuten dauern (tabellenlastige Seiten),
    # die App-Timeout liegt bei 5400 s -> Proxy großzügig darüber.
    timeout connect 5s
    timeout client  2h
    timeout server  2h
    retries 2

frontend vllm_front
    bind *:8013
    default_backend vllm_pool

backend vllm_pool
    balance leastconn
    option httpchk
    http-check send meth GET uri /health
    # 'check' nimmt einen ausgefallenen Endpunkt automatisch raus (Failover);
    # vip ist über das Host-Netz lokal erreichbar, tbv über die 10-GbE-LAN.
    server vip 127.0.0.1:8012   check inter 5s fall 3 rise 2
    server tbv 172.31.102.12:8012 check inter 5s fall 3 rise 2
